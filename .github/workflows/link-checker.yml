          function checkUrl(resource) {
            return new Promise((resolve) => {
              const parsedUrl = new URL(resource.url);
              const protocol = parsedUrl.protocol === 'https:' ? https : http;
              const options = {
                hostname: parsedUrl.hostname,
                path: parsedUrl.pathname + parsedUrl.search,
                method: 'GET',
                timeout: 15000,
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.5',
                  'Connection': 'close'
                }
              };

              const req = protocol.request(options, (res) => {
                const status = res.statusCode;
                // Follow one level of redirect
                if ((status === 301 || status === 302 || status === 307 || status === 308) && res.headers.location) {
                  resolve({ ...resource, status, result: 'ok', note: `Redirects to ${res.headers.location}` });
                } else if (status >= 200 && status < 400) {
                  resolve({ ...resource, status, result: 'ok', note: '' });
                } else {
                  resolve({ ...resource, status, result: 'broken', note: `HTTP ${status}` });
                }
                res.resume();
              });

              req.on('timeout', () => {
                req.destroy();
                resolve({ ...resource, status: 'TIMEOUT', result: 'broken', note: 'Connection timed out' });
              });

              req.on('error', (err) => {
                resolve({ ...resource, status: 'ERROR', result: 'broken', note: err.message });
              });

              req.end();
            });
          }

          async function runChecks() {
            const broken = [];
            const working = [];

            for (const resource of resources) {
              process.stdout.write(`Checking: ${resource.name}... `);
              const result = await checkUrl(resource);
              if (result.result === 'broken') {
                console.log(`BROKEN (${result.status})`);
                broken.push(result);
              } else {
                console.log(`OK (${result.status})`);
                working.push(result);
              }
              // Small delay between requests
              await new Promise(r => setTimeout(r, 500));
            }

            console.log('\n========================================');
            console.log(`CANCERCOMPASS LINK CHECK COMPLETE`);
            console.log(`Date: ${new Date().toLocaleDateString('en-US')}`);
            console.log(`Total checked: ${resources.length}`);
            console.log(`Working: ${working.length}`);
            console.log(`Broken: ${broken.length}`);
            console.log('========================================\n');

            if (broken.length > 0) {
              console.log('BROKEN LINKS REQUIRING ACTION:');
              broken.forEach(r => {
                console.log(`\n• ${r.name}`);
                console.log(`  URL: ${r.url}`);
                console.log(`  Issue: ${r.note}`);
              });

              // Write broken links to file for use in next step
              const fs = require('fs');
              fs.writeFileSync('broken-links.json', JSON.stringify(broken, null, 2));
              process.exit(1); // Exit with error to trigger notification
            } else {
              console.log('All links verified working. No action needed.');
              process.exit(0);
            }
          }

          runChecks().catch(err => {
            console.error('Check failed:', err);
            process.exit(1);
          });
          EOF

      - name: Send email if broken links found
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "⚠️ CancerCompass — Broken Links Found"
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: CancerCompass Link Checker
          body: |
            Your scheduled CancerCompass link check has found broken links that need attention.

            Please log into your CancerCompass admin page and update or remove the broken resources.

            Check the GitHub Actions log for the full list:
            https://github.com/${{ github.repository }}/actions

            Date checked: ${{ github.run_id }}

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "✅ CancerCompass — All 199 Links Verified Working"
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: CancerCompass Link Checker
          body: |
            Your scheduled CancerCompass link check is complete.

            All 199 resource links are verified working as of today.

            No action needed.

            Date checked: ${{ github.run_id }}
