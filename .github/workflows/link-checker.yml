name: CancerCompass Link Checker

on:
  schedule:
    # Runs every 90 days at 8am — Jan 1, Apr 1, Jul 1, Oct 1
    - cron: '0 8 1 1,4,7,10 *'
  workflow_dispatch:
    # Also allows you to run it manually anytime from GitHub

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

